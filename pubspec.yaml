name: mind_voice
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/images/

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: any
  uuid: any
  intl: any
  get_it: any
  http: ^1.6.0
  shared_preferences: ^2.5.4
  jwt_decoder: ^2.0.1
  dartz: ^0.10.1
  record: ^6.2.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  audioplayers: ^6.5.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/Logo1.png
  adaptive_icon_foreground: assets/images/Logo1.png
  adaptive_icon_foreground_inset: 12
  adaptive_icon_background: "#000000"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/images/Logo1.png
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: assets/images/Logo1.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/images/Logo1.png

